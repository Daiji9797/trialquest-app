name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Validate deployment token
        run: |
          TOKEN="${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN is empty or not accessible in this job. Add it in Repository Secrets."
            exit 1
          fi
          LEN=${#TOKEN}
          echo "Deployment token length: $LEN"
          if [ "$LEN" -lt 80 ]; then
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN looks too short. Re-paste token from Azure Portal without quotes/spaces/newlines."
            exit 1
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "frontend/build" # Prebuilt app content path
          api_location: "api" # Api source code path - optional
          output_location: "" # Already built, so no output directory
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
